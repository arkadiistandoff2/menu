<!-- templates/admin.html -->

<!DOCTYPE html>
<html lang="uk">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

</head>

<body class="bg-zinc-950 text-white p-5">

<h1 class="text-5xl font-bold mb-10">
⚡ Admin Panel
</h1>

<div class="grid md:grid-cols-2 gap-10">

<div>

<h2 class="text-3xl font-bold mb-5">
➕ Додати товар
</h2>

<div class="bg-zinc-900 p-5 rounded-3xl">

<input id="name" placeholder="Назва"
class="w-full mb-3 p-4 rounded-xl bg-zinc-800">

<input id="price" placeholder="Ціна"
class="w-full mb-3 p-4 rounded-xl bg-zinc-800">

<input id="category" placeholder="Категорія"
class="w-full mb-3 p-4 rounded-xl bg-zinc-800">

<input id="image" placeholder="Фото"
class="w-full mb-3 p-4 rounded-xl bg-zinc-800">

<button onclick="addMenu()"
class="bg-green-500 w-full py-4 rounded-xl font-bold">
Додати
</button>

</div>

</div>

<div>

<h2 class="text-3xl font-bold mb-5">
🧾 Замовлення
</h2>

<div id="orders"></div>

</div>

</div>

<script>

const socket = io();

async function addMenu(){

    await fetch("/api/menu/add",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            name:name.value,
            price:price.value,
            category:category.value,
            image:image.value
        })
    });

    alert("Додано");
}

async function loadOrders(){

    const res = await fetch("/api/orders");

    const data = await res.json();

    const orders = document.getElementById("orders");

    orders.innerHTML = "";

    data.reverse().forEach(order=>{

        orders.innerHTML += `
        <div class="bg-zinc-900 p-5 rounded-3xl mb-5">

            <div class="flex justify-between">

                <h2 class="text-2xl font-bold">
                    Стіл #${order.table}
                </h2>

                <span class="text-green-400">
                    ${order.status}
                </span>

            </div>

            <div class="mt-5">

                ${order.items.map(item=>`
                    <div class="mb-2">
                        ${item.name}
                    </div>
                `).join("")}

            </div>

            <button onclick="setStatus(${order.id}, 'В шляху до вас')"
            class="mt-5 bg-green-500 px-5 py-3 rounded-xl">
                Готово
            </button>

            <button onclick="cancelOrder(${order.id})"
            class="mt-5 bg-red-500 px-5 py-3 rounded-xl">
                Відхилити
            </button>

        </div>
        `;
    });
}

async function setStatus(id,status){

    await fetch("/api/order/status",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            id,
            status
        })
    });

    loadOrders();
}

async function cancelOrder(id){

    const reason = prompt("Причина");

    await fetch("/api/order/status",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            id,
            status:"Відхилено",
            comment:reason
        })
    });

    loadOrders();
}

socket.on("new_order",(order)=>{

    alert("🔔 Нове замовлення! Стіл #" + order.table);

    loadOrders();

});

loadOrders();

</script>

</body>
</html>
