<!-- templates/admin.html -->

<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

</head>

<body class="bg-zinc-950 text-white p-5">

<div class="flex justify-between items-center mb-10">

<h1 class="text-5xl font-bold">
⚡ Admin Panel
</h1>

<a href="/logout"
class="bg-red-500 px-6 py-3 rounded-2xl">
Logout
</a>

</div>

<div class="grid md:grid-cols-2 gap-10">

<div>

<h2 class="text-3xl font-bold mb-5">
➕ Додати товар
</h2>

<div class="bg-zinc-900 p-5 rounded-3xl">

<input id="name"
placeholder="Назва"
class="w-full mb-3 p-4 rounded-xl bg-zinc-800">

<textarea id="description"
placeholder="Опис"
class="w-full mb-3 p-4 rounded-xl bg-zinc-800"></textarea>

<input id="price"
placeholder="Ціна"
class="w-full mb-3 p-4 rounded-xl bg-zinc-800">

<input id="category"
placeholder="Категорія"
class="w-full mb-3 p-4 rounded-xl bg-zinc-800">

<input id="image"
placeholder="Фото (burger.jpg)"
class="w-full mb-3 p-4 rounded-xl bg-zinc-800">

<button
onclick="addMenu()"
class="bg-green-500 w-full py-4 rounded-2xl font-bold">
Додати
</button>

</div>

<h2 class="text-3xl font-bold mt-10 mb-5">
📦 Товари
</h2>

<div id="products"></div>

</div>

<div>

<h2 class="text-3xl font-bold mb-5">
🧾 Замовлення
</h2>

<div id="orders"></div>

</div>

</div>

<script>

const socket = io();

let MENU = [];

async function loadMenu(){

    const res = await fetch("/api/menu");

    const data = await res.json();

    MENU = data;

    const products = document.getElementById("products");

    products.innerHTML = "";

    data.forEach(item=>{

        products.innerHTML += `
        <div class="bg-zinc-900 p-5 rounded-3xl mb-5">

            <div class="flex gap-5">

                <img
                src="/static/images/${item.image}"
                class="w-32 h-32 rounded-2xl object-cover">

                <div>

                    <h2 class="text-2xl font-bold">
                        ${item.name}
                    </h2>

                    <div class="text-zinc-400 mt-2">
                        ${item.description}
                    </div>

                    <div class="text-green-400 text-2xl mt-2">
                        ${item.price} ₴
                    </div>

                    <div class="text-zinc-500 mt-2">
                        ${item.category}
                    </div>

                </div>

            </div>

            <div class="flex gap-3 mt-5">

                <button
                onclick="editProduct(${item.id})"
                class="bg-yellow-500 px-5 py-3 rounded-xl">
                    Редагувати
                </button>

                <button
                onclick="deleteProduct(${item.id})"
                class="bg-red-500 px-5 py-3 rounded-xl">
                    Видалити
                </button>

            </div>

        </div>
        `;
    });
}

async function addMenu(){

    await fetch("/api/menu/add",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            name:name.value,
            description:description.value,
            price:price.value,
            category:category.value,
            image:image.value
        })
    });

    loadMenu();
}

async function deleteProduct(id){

    await fetch("/api/menu/delete/" + id,{
        method:"POST"
    });

    loadMenu();
}

async function editProduct(id){

    const item = MENU.find(x=>x.id == id);

    const newName = prompt("Назва",item.name);
    const newDescription = prompt("Опис",item.description);
    const newPrice = prompt("Ціна",item.price);
    const newCategory = prompt("Категорія",item.category);
    const newImage = prompt("Фото",item.image);

    await fetch("/api/menu/edit/" + id,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            name:newName,
            description:newDescription,
            price:newPrice,
            category:newCategory,
            image:newImage
        })
    });

    loadMenu();
}

async function loadOrders(){

    const res = await fetch("/api/orders");

    const data = await res.json();

    const orders = document.getElementById("orders");

    orders.innerHTML = "";

    data.reverse().forEach(order=>{

        orders.innerHTML += `
        <div class="bg-zinc-900 p-5 rounded-3xl mb-5">

            <div class="flex justify-between">

                <h2 class="text-3xl font-bold">
                    Стіл #${order.table}
                </h2>

                <div class="text-green-400">
                    ${order.status}
                </div>

            </div>

            <div class="mt-5">

                ${order.items.map(item=>`
                    <div class="mb-2">
                        ${item.name}
                    </div>
                `).join("")}

            </div>

            <div class="mt-5 text-2xl font-bold text-green-400">
                ${order.total} ₴
            </div>

            <button
            onclick="setStatus(${order.id}, 'Готується')"
            class="mt-5 bg-yellow-500 px-5 py-3 rounded-xl">
                Готується
            </button>

            <button
            onclick="setStatus(${order.id}, 'В шляху до вас')"
            class="mt-5 bg-green-500 px-5 py-3 rounded-xl">
                Готово
            </button>

        </div>
        `;
    });
}

async function setStatus(id,status){

    await fetch("/api/order/status",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            id,
            status
        })
    });

    loadOrders();
}

socket.on("new_order",(order)=>{

    alert("🔔 Нове замовлення! Стіл #" + order.table);

    loadOrders();

});

socket.on("menu_updated",()=>{

    loadMenu();

});

loadMenu();
loadOrders();

</script>

</body>

</html>
