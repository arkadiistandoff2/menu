<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід до системи управління</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-6">
    <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl w-full max-w-md shadow-2xl text-center">
        <h1 class="text-3xl font-black mb-2 tracking-tight">Панель адміна</h1>
        <p class="text-zinc-500 font-medium mb-8">Будь ласка, введіть ключ доступу</p>
        
        <form method="POST" action="/login">
            <input type="password" name="password" placeholder="Ключ доступу" required autofocus
                   class="w-full bg-zinc-800 border border-zinc-700 text-white p-4 rounded-xl mb-4 outline-none focus:border-white transition text-center text-lg font-bold">
            <button type="submit" class="w-full bg-white text-black hover:bg-zinc-200 py-4 rounded-xl font-bold text-lg transition duration-200 active:scale-98">
                Авторизуватись
            </button>
        </form>
    </div>
</body>
</html>
