<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід в Адмінку</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-5">

    <div class="bg-zinc-900 p-8 rounded-[40px] border border-zinc-800 w-full max-w-sm text-center shadow-2xl">
        <div class="w-20 h-20 bg-blue-600 rounded-[24px] flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-600/30 text-3xl">
            🔐
        </div>
        <h1 class="text-3xl font-black mb-2 tracking-tighter">Адмін Панель</h1>
        <p class="text-zinc-500 mb-8 font-semibold">Введіть пароль для доступу</p>
        
        <form method="POST" action="/login">
            <input type="password" name="password" placeholder="Пароль" required 
                   class="w-full bg-zinc-950 text-white p-5 rounded-2xl outline-none mb-4 border border-zinc-800 focus:border-blue-500 transition text-center text-xl tracking-widest font-black">
            <button type="submit" class="w-full bg-white hover:bg-zinc-200 text-black py-5 rounded-2xl font-bold text-lg active:scale-95 transition shadow-lg">
                Увійти
            </button>
        </form>
    </div>

</body>
</html>
