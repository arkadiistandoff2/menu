<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід в Адмінку</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-5">

    <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 w-full max-w-sm text-center shadow-2xl">
        <div class="text-5xl mb-4">🔐</div>
        <h1 class="text-3xl font-bold mb-2">Адмін Панель</h1>
        <p class="text-zinc-500 mb-8 font-semibold">Введіть пароль для доступу</p>
        
        <form method="POST" action="/login">
            <input type="password" name="password" placeholder="Пароль..." required 
                   class="w-full bg-zinc-800 text-white p-4 rounded-xl outline-none mb-4 border border-zinc-700 focus:border-blue-500 transition text-center text-lg tracking-widest">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-bold text-lg active:scale-95 transition">
                Увійти
            </button>
        </form>
    </div>

</body>
</html>
