<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Меню ресторану</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding-bottom: 90px; }
        /* Модальне вікно кошика */
        #cart-modal { transition: transform 0.3s ease-in-out; }
        .cart-hidden { transform: translateY(100%); }
        .cart-visible { transform: translateY(0); }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900">

<!-- Хедер з категоріями -->
<div class="sticky top-0 bg-white shadow-sm z-40 pb-2">
    <div class="p-5 pb-2">
        <h1 class="text-2xl font-bold">Меню. Стіл #{{ table_id }}</h1>
    </div>
    <div id="category-filters" class="flex overflow-x-auto px-5 gap-3 no-scrollbar pb-2">
        <!-- Категорії генеруються тут -->
    </div>
</div>

<!-- Список товарів -->
<div class="p-5">
    <div id="menu" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Товари генеруються тут -->
    </div>
</div>

<!-- Нижня панель (фіксована) -->
<div class="fixed bottom-0 left-0 w-full bg-white border-t border-zinc-200 p-4 px-6 flex justify-between items-center z-50 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
    <div>
        <div class="text-sm text-zinc-500">Загальна сума</div>
        <div class="text-xl font-bold text-green-600"><span id="bar-total">0</span> ₴</div>
    </div>
    <button onclick="toggleCart()" class="bg-zinc-900 text-white px-8 py-3 rounded-full font-bold shadow-lg flex gap-2 items-center active:scale-95 transition">
        Кошик <span id="bar-count" class="bg-white text-zinc-900 rounded-full px-2 py-0.5 text-xs font-bold ml-1">0</span>
    </button>
</div>

<!-- Модальне вікно кошика -->
<div id="cart-modal" class="fixed inset-0 bg-white z-[60] cart-hidden flex flex-col">
    <div class="p-5 border-b border-zinc-100 flex justify-between items-center bg-white">
        <h2 class="text-2xl font-bold">Ваш кошик</h2>
        <button onclick="toggleCart()" class="p-2 bg-zinc-100 rounded-full text-zinc-500 hover:bg-zinc-200">✕</button>
    </div>
    
    <div id="cart-items" class="flex-1 overflow-y-auto p-5 bg-zinc-50">
        <!-- Товари в кошику -->
    </div>
    
    <div class="p-5 bg-white border-t border-zinc-100 pb-10">
        <div class="flex justify-between items-center mb-5">
            <span class="text-lg text-zinc-500">До сплати:</span>
            <span class="text-2xl font-bold text-green-600"><span id="modal-total">0</span> ₴</span>
        </div>
        <button onclick="sendOrder()" class="w-full bg-green-500 text-white py-4 rounded-2xl text-lg font-bold active:scale-95 transition shadow-lg">
            Оформити замовлення
        </button>
    </div>
</div>

<script>
const socket = io();
const TABLE_ID = {{ table_id }};

let MENU = [];
let CATEGORIES = [];
let cart = [];
let activeCategory = 'all';

async function loadData() {
    const [menuRes, catRes] = await Promise.all([
        fetch("/api/menu"),
        fetch("/api/categories")
    ]);
    MENU = await menuRes.json();
    CATEGORIES = await catRes.json();
    
    renderCategories();
    renderMenu();
}

function renderCategories() {
    const filters = document.getElementById("category-filters");
    filters.innerHTML = `<button onclick="setCategory('all')" class="whitespace-nowrap px-4 py-2 rounded-full text-sm font-semibold transition ${activeCategory === 'all' ? 'bg-zinc-900 text-white' : 'bg-zinc-100 text-zinc-600'}">Всі</button>`;
    
    CATEGORIES.forEach(cat => {
        const isActive = activeCategory === cat.name;
        filters.innerHTML += `<button onclick="setCategory('${cat.name}')" class="whitespace-nowrap px-4 py-2 rounded-full text-sm font-semibold transition ${isActive ? 'bg-zinc-900 text-white' : 'bg-zinc-100 text-zinc-600'}">${cat.name}</button>`;
    });
}

function setCategory(name) {
    activeCategory = name;
    renderCategories();
    renderMenu();
}

function renderMenu() {
    const menuDiv = document.getElementById("menu");
    menuDiv.innerHTML = "";
    
    const filteredMenu = activeCategory === 'all' ? MENU : MENU.filter(m => m.category === activeCategory);

    if (filteredMenu.length === 0) {
        menuDiv.innerHTML = `<div class="text-center text-zinc-400 py-10 w-full col-span-full">У цій категорії поки пусто</div>`;
        return;
    }

    filteredMenu.forEach(item => {
        menuDiv.innerHTML += `
        <div class="bg-white rounded-2xl shadow-sm border border-zinc-100 overflow-hidden flex flex-col">
            <div class="h-48 w-full bg-zinc-200">
                <img src="/static/images/${item.image}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x300/e4e4e7/a1a1aa?text=No+Photo'">
            </div>
            <div class="p-5 flex-1 flex flex-col">
                <div class="flex justify-between items-start mb-2">
                    <h2 class="text-lg font-bold leading-tight pr-2">${item.name}</h2>
                    <div class="text-green-600 font-bold whitespace-nowrap">${item.price} ₴</div>
                </div>
                <p class="text-sm text-zinc-500 mb-4 flex-1 line-clamp-2">${item.description}</p>
                <button onclick='addToCart(${JSON.stringify(item)})' class="w-full bg-zinc-100 text-zinc-900 font-bold py-3 rounded-xl active:bg-zinc-200 transition">
                    Додати
                </button>
            </div>
        </div>
        `;
    });
}

function addToCart(item) {
    cart.push(item);
    updateCartUI();
}

function removeFromCart(index) {
    cart.splice(index, 1);
    updateCartUI();
    if(cart.length === 0) toggleCart();
}

function updateCartUI() {
    let total = cart.reduce((sum, item) => sum + Number(item.price), 0);
    
    // Оновлення нижньої панелі
    document.getElementById("bar-total").innerText = total;
    document.getElementById("bar-count").innerText = cart.length;
    
    // Оновлення модалки
    document.getElementById("modal-total").innerText = total;
    
    const cartItems = document.getElementById("cart-items");
    if(cart.length === 0) {
        cartItems.innerHTML = `<div class="text-center text-zinc-400 mt-10">Кошик порожній</div>`;
    } else {
        cartItems.innerHTML = cart.map((item, index) => `
            <div class="bg-white p-4 rounded-2xl mb-3 shadow-sm border border-zinc-100 flex justify-between items-center">
                <div>
                    <div class="font-bold text-zinc-900">${item.name}</div>
                    <div class="text-sm text-zinc-500">${item.price} ₴</div>
                </div>
                <button onclick="removeFromCart(${index})" class="w-8 h-8 flex justify-center items-center rounded-full bg-red-50 text-red-500 active:bg-red-100 transition">✕</button>
            </div>
        `).join("");
    }
}

function toggleCart() {
    if(cart.length === 0 && document.getElementById('cart-modal').classList.contains('cart-hidden')) {
        alert("Кошик порожній");
        return;
    }
    const modal = document.getElementById("cart-modal");
    if(modal.classList.contains("cart-hidden")) {
        modal.classList.remove("cart-hidden");
        modal.classList.add("cart-visible");
    } else {
        modal.classList.remove("cart-visible");
        modal.classList.add("cart-hidden");
    }
}

async function sendOrder() {
    if(cart.length === 0) return;

    let total = cart.reduce((sum, item) => sum + Number(item.price), 0);

    const btn = event.target;
    btn.innerText = "Відправка...";
    btn.disabled = true;

    await fetch("/api/order", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            table: TABLE_ID,
            items: cart,
            total: total
        })
    });

    cart = [];
    updateCartUI();
    toggleCart();
    
    btn.innerText = "Оформити замовлення";
    btn.disabled = false;
    alert("Замовлення успішно створено! Очікуйте.");
}

socket.on("menu_updated", () => loadData());
socket.on("order_updated", () => {
    // Сповіщення клієнта про зміну статусу можна додати тут
});

loadData();
updateCartUI();
</script>

</body>
</html>
