<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Меню ресторану</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; padding-bottom: 90px; }
        .slide-modal { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-hidden { transform: translateY(100%); }
        .modal-visible { transform: translateY(0); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        * { transition: background-color 0.3s, border-color 0.3s; }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-black text-zinc-900 dark:text-zinc-100 min-h-screen">

    <header class="sticky top-0 z-40 bg-white/80 dark:bg-black/80 backdrop-blur-md border-b border-zinc-200 dark:border-zinc-800 px-5 py-4">
        <div class="flex justify-between items-center max-w-2xl mx-auto">
            <h1 class="text-2xl font-bold tracking-tight">Меню</h1>
            <button onclick="toggleTheme()" class="p-2 bg-zinc-100 dark:bg-zinc-900 rounded-full">
                <span id="theme-icon" class="text-xl"></span>
            </button>
        </div>
    </header>

    <main class="p-5 max-w-2xl mx-auto">
        <div id="categories" class="flex gap-2 overflow-x-auto no-scrollbar pb-6 mb-2">
            <button onclick="filterCategory('all')" id="cat-all" class="px-5 py-2.5 rounded-full whitespace-nowrap font-semibold bg-zinc-900 dark:bg-white text-white dark:text-black shadow-lg">Все</button>
        </div>

        <div id="menu" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-5 z-50 pointer-events-none">
        <button id="cart-btn" onclick="toggleCart(true)" class="hidden pointer-events-auto w-full max-w-md mx-auto bg-zinc-900 dark:bg-white text-white dark:text-black py-5 rounded-2xl font-bold shadow-2xl flex justify-between px-8 active:scale-95 transition-transform">
            <span>Переглянути кошик</span>
            <span id="cart-count-total">0</span>
        </button>
    </div>

    <div id="cart-modal" class="fixed inset-0 z-[60] hidden">
        <div onclick="toggleCart(false)" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white dark:bg-zinc-950 rounded-t-[40px] max-h-[90vh] overflow-hidden flex flex-col slide-modal modal-hidden">
            <div class="w-12 h-1.5 bg-zinc-200 dark:bg-zinc-800 mx-auto mt-4 rounded-full"></div>
            <div class="p-8 pb-32 overflow-y-auto no-scrollbar">
                <h2 class="text-3xl font-bold mb-6">Ваше замовлення</h2>
                <div id="cart-items" class="space-y-6"></div>
                
                <div class="mt-8 pt-6 border-t border-zinc-100 dark:border-zinc-900">
                    <textarea id="order-comment" placeholder="Ваш коментар до замовлення..." class="w-full bg-zinc-50 dark:bg-zinc-900 p-4 rounded-2xl outline-none focus:ring-2 ring-zinc-200 dark:ring-zinc-800 transition"></textarea>
                </div>
            </div>
            
            <div class="absolute bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-white dark:from-zinc-950 pt-10">
                <button id="send-order-btn" onclick="sendOrder()" class="w-full bg-zinc-900 dark:bg-white text-white dark:text-black py-5 rounded-2xl font-bold text-lg shadow-xl flex justify-between px-10">
                    <span>Замовити</span>
                    <span id="cart-sum">0 ₴</span>
                </button>
            </div>
        </div>
    </div>

    <div id="review-modal" class="fixed inset-0 z-[70] hidden flex items-center justify-center p-5">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md"></div>
        <div class="bg-white dark:bg-zinc-900 rounded-[35px] p-8 w-full max-w-sm relative z-10 text-center shadow-2xl">
            <h2 class="text-2xl font-bold mb-2">Оцініть нас</h2>
            <p class="text-zinc-500 mb-6">Ваша думка дуже важлива</p>
            
            <div id="star-rating" class="flex justify-center gap-3 mb-8 text-4xl">
                <span data-value="1" class="cursor-pointer text-zinc-300 dark:text-zinc-700">★</span>
                <span data-value="2" class="cursor-pointer text-zinc-300 dark:text-zinc-700">★</span>
                <span data-value="3" class="cursor-pointer text-zinc-300 dark:text-zinc-700">★</span>
                <span data-value="4" class="cursor-pointer text-zinc-300 dark:text-zinc-700">★</span>
                <span data-value="5" class="cursor-pointer text-zinc-300 dark:text-zinc-700">★</span>
            </div>
            
            <textarea id="review-text" placeholder="Що вам сподобалось?" class="w-full bg-zinc-50 dark:bg-zinc-800 p-4 rounded-2xl mb-6 outline-none h-24"></textarea>
            <button onclick="sendReview()" class="w-full bg-zinc-900 dark:bg-white text-white dark:text-black py-4 rounded-2xl font-bold">Надіслати</button>
            <button onclick="closeReview()" class="mt-4 text-zinc-500 font-semibold">Закрити</button>
        </div>
    </div>

    <script>
        const socket = io();
        const TABLE_ID = window.location.pathname.replace('/', '') || "1";
        const CLIENT_ID = localStorage.getItem('client_id') || 'id_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('client_id', CLIENT_ID);

        let MENU = [];
        let activeCategory = 'all';
        let cart = JSON.parse(localStorage.getItem('cart')) || []; // Зберігання кошика
        let reviewRating = 0;
        let currentReviewOrderId = null;

        async function loadData() {
            const [mRes, cRes] = await Promise.all([fetch('/api/menu'), fetch('/api/categories')]);
            MENU = await mRes.json();
            renderCategories(await cRes.json());
            renderMenu();
            updateCartUI();
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }

        function renderCategories(cats) {
            const container = document.getElementById("categories");
            container.innerHTML = `<button onclick="filterCategory('all')" id="cat-all" class="px-5 py-2.5 rounded-full whitespace-nowrap font-semibold ${activeCategory === 'all' ? 'bg-zinc-900 dark:bg-white text-white dark:text-black shadow-lg' : 'bg-zinc-100 dark:bg-zinc-900 text-zinc-500'}">Все</button>` + 
                cats.map(c => `
                <button onclick="filterCategory('${c.name}')" id="cat-${c.id}" class="px-5 py-2.5 rounded-full whitespace-nowrap font-semibold ${activeCategory === c.name ? 'bg-zinc-900 dark:bg-white text-white dark:text-black shadow-lg' : 'bg-zinc-100 dark:bg-zinc-900 text-zinc-500'}">${c.name}</button>
            `).join("");
        }

        function filterCategory(cat) {
            activeCategory = cat;
            loadData();
        }

        function renderMenu() {
            const m = document.getElementById("menu");
            const filtered = activeCategory === 'all' ? MENU : MENU.filter(i => i.category === activeCategory);
            
            m.innerHTML = filtered.map(item => {
                // Картинка тепер може бути або Base64 (data:...), або посиланням
                const imgSrc = item.image.startsWith('data:') ? item.image : `/static/images/${item.image}`;
                
                return `
                <div class="bg-white dark:bg-zinc-900 rounded-3xl shadow-sm border border-zinc-100 dark:border-zinc-800 overflow-hidden flex flex-col pb-4">
                    <div class="h-48 bg-zinc-100 dark:bg-zinc-800 relative">
                        ${item.image ? `<img src="${imgSrc}" class="w-full h-full object-cover">` : ''}
                        <div class="absolute bottom-3 right-3 bg-white/90 dark:bg-zinc-900/90 backdrop-blur px-4 py-1.5 rounded-full font-bold shadow-sm">${item.price} ₴</div>
                    </div>
                    <div class="px-5 pt-4 flex-1 flex flex-col">
                        <h2 class="text-xl font-bold mb-1">${item.name}</h2>
                        <p class="text-xs text-zinc-500 mb-4 line-clamp-2">${item.description || ''}</p>
                        <button onclick='addToCart(${JSON.stringify(item)})' class="bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 font-bold py-3.5 rounded-xl active:scale-95 transition">Додати</button>
                    </div>
                </div>`
            }).join("");
        }

        function addToCart(item) {
            cart.push({...item, cartId: Date.now()});
            updateCartUI();
        }

        function removeFromCart(cartId) {
            cart = cart.filter(i => i.cartId !== cartId);
            updateCartUI();
        }

        function updateCartUI() {
            localStorage.setItem('cart', JSON.stringify(cart)); // Зберігаємо в браузері
            const count = cart.length;
            const sum = cart.reduce((a, b) => a + parseInt(b.price), 0);
            
            document.getElementById("cart-count-total").innerText = count;
            document.getElementById("cart-sum").innerText = sum + " ₴";
            document.getElementById("cart-btn").classList.toggle("hidden", count === 0);
            
            const itemsCont = document.getElementById("cart-items");
            itemsCont.innerHTML = cart.map(i => `
                <div class="flex justify-between items-center bg-zinc-50 dark:bg-zinc-900 p-4 rounded-2xl">
                    <div>
                        <div class="font-bold text-lg">${i.name}</div>
                        <div class="text-zinc-500">${i.price} ₴</div>
                    </div>
                    <button onclick="removeFromCart(${i.cartId})" class="text-zinc-400 font-bold p-2 px-4 hover:text-red-500">Видалити</button>
                </div>
            `).join("");

            if (count === 0) toggleCart(false);
            syncWithServer();
        }

        function toggleCart(show) {
            const m = document.getElementById("cart-modal");
            const content = m.querySelector('.slide-modal');
            if (show) {
                m.classList.remove("hidden");
                setTimeout(() => content.classList.replace("modal-hidden", "modal-visible"), 10);
            } else {
                content.classList.replace("modal-visible", "modal-hidden");
                setTimeout(() => m.classList.add("hidden"), 300);
            }
        }

        async function sendOrder() {
            const btn = document.getElementById("send-order-btn");
            btn.disabled = true;
            btn.innerText = "Відправляємо...";

            const res = await fetch("/api/order", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    table: TABLE_ID,
                    items: cart,
                    total: cart.reduce((a, b) => a + parseInt(b.price), 0),
                    comment: document.getElementById("order-comment").value,
                    client_id: CLIENT_ID
                })
            });

            const data = await res.json();
            currentReviewOrderId = data.order_id;
            
            cart = [];
            updateCartUI();
            toggleCart(false);
            btn.disabled = false;
            btn.innerHTML = `<span>Замовити</span><span id="cart-sum">0 ₴</span>`;
            
            showToast("Замовлення відправлено");
        }

        function syncWithServer() {
            socket.emit("sync_client", {
                client_id: CLIENT_ID, table_id: TABLE_ID, cart: cart, user_agent: navigator.userAgent
            });
        }

        function showToast(text) {
            const t = document.createElement("div");
            t.className = "fixed top-10 left-1/2 -translate-x-1/2 bg-zinc-900 text-white dark:bg-white dark:text-black px-8 py-4 rounded-2xl shadow-2xl font-bold z-[100] transition-opacity duration-300 animate-bounce";
            t.innerText = text;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
        }

        // Логіка зірок
        const stars = document.querySelectorAll("#star-rating span");
        stars.forEach(star => {
            star.addEventListener("click", (e) => {
                reviewRating = parseInt(e.target.dataset.value);
                stars.forEach((s, i) => s.className = i < reviewRating ? "text-yellow-500" : "text-zinc-300 dark:text-zinc-700");
            });
        });

        function closeReview() { document.getElementById("review-modal").classList.add("hidden"); }

        async function sendReview() {
            if (reviewRating === 0) return alert("Оберіть кількість зірок");
            await fetch("/api/review", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ 
                    order_id: currentReviewOrderId, 
                    rating: reviewRating, 
                    text: document.getElementById("review-text").value 
                })
            });
            closeReview();
            showToast("Дякуємо за відгук");
        }

        socket.on("notify_client", (data) => {
            if (data.status === "Завершене") {
                document.getElementById("review-modal").classList.remove("hidden");
            }
        });

        socket.on("menu_updated", loadData);
        window.onload = loadData;
    </script>
</body>
</html>
