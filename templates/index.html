<!-- templates/index.html -->

<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restaurant</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    font-family: Montserrat;
}

</style>

</head>

<body class="bg-zinc-950 text-white">

<div class="p-5">

<h1 class="text-5xl font-bold mb-10">
🍽 Меню
</h1>

<div id="menu"
class="grid grid-cols-1 md:grid-cols-3 gap-5">
</div>

<h2 class="text-4xl font-bold mt-10 mb-5">
🛒 Кошик
</h2>

<div id="cart"></div>

<div class="mt-5 text-3xl font-bold">
Итого:
<span id="total">0</span> ₴
</div>

<button onclick="sendOrder()"
class="mt-5 bg-green-500 px-8 py-4 rounded-2xl text-xl font-bold">
Замовити
</button>

</div>

<script>

const socket = io();

const TABLE_ID = {{ table_id }};

let cart = [];

async function loadMenu(){

    const res = await fetch("/api/menu");

    const data = await res.json();

    const menu = document.getElementById("menu");

    menu.innerHTML = "";

    data.forEach(item=>{

        menu.innerHTML += `
        <div class="bg-zinc-900 rounded-3xl overflow-hidden">

            <img
            src="/static/images/${item.image}"
            class="w-full h-64 object-cover">

            <div class="p-5">

                <h2 class="text-3xl font-bold">
                    ${item.name}
                </h2>

                <p class="text-zinc-400 mt-3">
                    ${item.description}
                </p>

                <div class="mt-3 text-green-400 text-2xl font-bold">
                    ${item.price} ₴
                </div>

                <div class="text-zinc-500 mt-2">
                    ${item.category}
                </div>

                <button
                onclick='addToCart(${JSON.stringify(item)})'
                class="mt-5 bg-green-500 w-full py-4 rounded-2xl font-bold">
                    Додати в кошик
                </button>

            </div>

        </div>
        `;
    });
}

function addToCart(item){

    cart.push(item);

    renderCart();
}

function renderCart(){

    const cartDiv = document.getElementById("cart");

    cartDiv.innerHTML = "";

    let total = 0;

    cart.forEach((item,index)=>{

        total += Number(item.price);

        cartDiv.innerHTML += `
        <div class="bg-zinc-900 p-5 rounded-2xl mb-3 flex justify-between items-center">

            <div>

                <div class="text-2xl font-bold">
                    ${item.name}
                </div>

                <div class="text-zinc-400">
                    ${item.price} ₴
                </div>

            </div>

            <button
            onclick="removeItem(${index})"
            class="bg-red-500 px-4 py-2 rounded-xl">
                ✖
            </button>

        </div>
        `;
    });

    total.innerText = total;
}

function removeItem(index){

    cart.splice(index,1);

    renderCart();
}

async function sendOrder(){

    if(cart.length <= 0){
        return;
    }

    let totalPrice = 0;

    cart.forEach(item=>{
        totalPrice += Number(item.price);
    });

    await fetch("/api/order",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            table:TABLE_ID,
            items:cart,
            total:totalPrice
        })
    });

    alert("Замовлення створено");

    cart = [];

    renderCart();
}

socket.on("menu_updated",()=>{

    loadMenu();

});

socket.on("order_updated",(data)=>{

    alert("Статус: " + data.status);

});

loadMenu();

</script>

</body>

</html>
