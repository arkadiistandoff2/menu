<!DOCTYPE html>
<html lang="uk" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Цифрове Меню</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-black text-white selection:bg-zinc-800 pb-32">

    <!-- Верхня панель -->
    <header class="sticky top-0 z-40 bg-black/80 backdrop-blur-md border-b border-zinc-900 px-6 py-5">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div>
                <h1 id="table-title" class="text-2xl font-black tracking-tight">Стіл #1</h1>
                <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest mt-0.5">Смачного відпочинку!</p>
            </div>
            <div class="w-10 h-10 rounded-full border border-zinc-800 flex items-center justify-center text-zinc-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>
    </header>

    <!-- Головний контент -->
    <main class="max-w-2xl mx-auto px-6 mt-6">
        
        <!-- Віджети статусів та Кнопки категорій разом з кнопкою виклику -->
        <div id="active-order-status" class="mb-6 hidden bg-zinc-900 border border-zinc-800 p-4 rounded-2xl flex justify-between items-center">
            <div>
                <p class="text-zinc-500 text-xs font-bold uppercase">Активне замовлення</p>
                <p id="order-id-label" class="text-sm font-bold text-zinc-300 mt-0.5">ID: -----</p>
            </div>
            <span id="order-status-badge" class="bg-white text-black text-xs font-black px-4 py-1.5 rounded-full uppercase tracking-wider">
                Обробка
            </span>
        </div>

        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-4 items-center">
            <button onclick="callWaiter()" class="bg-white text-black px-6 py-3 rounded-full whitespace-nowrap font-extrabold text-sm transition active:scale-95 shrink-0">
                Виклик офіціанта
            </button>
            <div class="h-6 w-[1px] bg-zinc-800 shrink-0 mx-1"></div>
            <div id="categories-container" class="flex gap-2">
                <!-- Категорії генеруються динамічно -->
            </div>
        </div>

        <!-- Сітка страв меню -->
        <div id="menu-grid" class="grid grid-cols-1 gap-6 mt-4">
            <!-- Страви генеруються динамічно -->
        </div>
    </main>

    <!-- Кнопка кошика внизу -->
    <div class="fixed bottom-6 left-0 right-0 px-6 z-50 pointer-events-none">
        <button id="cart-trigger-btn" onclick="openCartModal()" class="hidden pointer-events-auto w-full max-w-md mx-auto bg-white text-black py-5 px-8 rounded-2xl font-black shadow-2xl justify-between items-center transition active:scale-95">
            <span class="text-base tracking-tight">Переглянути кошик</span>
            <span id="cart-total-badge" class="bg-black text-white px-4 py-1.5 rounded-xl text-sm font-black">0 ₴</span>
        </button>
    </div>

    <!-- Модальне вікно кошика -->
    <div id="cart-modal" class="fixed inset-0 z-[60] hidden">
        <div onclick="closeCartModal()" class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-800 rounded-t-[2.5rem] max-h-[85vh] overflow-hidden flex flex-col">
            <div class="w-12 h-1 bg-zinc-800 mx-auto mt-4 rounded-full"></div>
            
            <div class="p-6 overflow-y-auto no-scrollbar flex-grow pb-32">
                <h2 class="text-2xl font-black tracking-tight mb-6">Ваше замовлення</h2>
                <div id="cart-items-list" class="space-y-3">
                    <!-- Товари в кошику -->
                </div>
            </div>
            
            <div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-zinc-950 via-zinc-950 to-transparent pt-10">
                <button onclick="submitOrder()" class="w-full bg-white text-black py-5 px-8 rounded-2xl font-black text-lg flex justify-between items-center shadow-xl transition active:scale-95">
                    <span>Підтвердити замовлення</span>
                    <span id="cart-final-price" class="text-xl font-black">0 ₴</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const tableId = window.location.pathname.replace('/', '') || "1";
        const clientId = localStorage.getItem('client_id') || 'usr_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('client_id', clientId);

        document.getElementById('table-title').innerText = `Стіл #${tableId}`;

        let currentCategory = "Все";
        let fullMenu = [];
        let categories = [];
        let cart = JSON.parse(localStorage.getItem(`cart_table_${tableId}`)) || [];
        let myCurrentOrderId = localStorage.getItem(`last_order_table_${tableId}`) || null;
        let myCurrentOrderStatus = localStorage.getItem(`last_order_status_${tableId}`) || null;

        async function init() {
            await loadMenuData();
            syncClientState();
            renderStatusWidget();
        }

        async function loadMenuData() {
            try {
                const [menuRes, catsRes] = await Promise.all([fetch('/api/menu'), fetch('/api/categories')]);
                fullMenu = await menuRes.json();
                categories = await catsRes.json();
                
                renderCategories();
                renderMenu();
                updateCartUI();
            } catch (err) {
                console.error("Помилка ініціалізації даних:", err);
            }
        }

        function syncClientState() {
            socket.emit("sync_client", {
                client_id: clientId,
                table: tableId,
                cart: cart,
                current_view: currentCategory
            });
        }

        function renderCategories() {
            const container = document.getElementById("categories-container");
            let html = `<button onclick="setCategory('Все')" class="px-5 py-3 rounded-full text-sm font-bold tracking-tight transition shrink-0 ${currentCategory === 'Все' ? 'bg-zinc-800 text-white border border-zinc-700' : 'bg-zinc-900 text-zinc-400'}">Все</button>`;
            
            html += categories.map(c => {
                const isAct = currentCategory === c.name;
                return `<button onclick="setCategory('${c.name}')" class="px-5 py-3 rounded-full text-sm font-bold tracking-tight transition shrink-0 ${isAct ? 'bg-zinc-800 text-white border border-zinc-700' : 'bg-zinc-900 text-zinc-400'}">${c.name}</button>`;
            }).join('');
            
            container.innerHTML = html;
        }

        function setCategory(cat) {
            currentCategory = cat;
            renderCategories();
            renderMenu();
            syncClientState();
        }

        function renderMenu() {
            const grid = document.getElementById("menu-grid");
            const filtered = currentCategory === 'Все' ? fullMenu : fullMenu.filter(m => m.category === currentCategory);
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="text-center py-12 text-zinc-600 font-bold">У цій категорії ще немає страв</div>`;
                return;
            }
            
            grid.innerHTML = filtered.map(item => `
                <div class="bg-zinc-900/40 border border-zinc-900 rounded-[2rem] p-4 flex flex-col relative overflow-hidden">
                    <div class="relative w-full h-56 bg-zinc-900 rounded-2xl overflow-hidden flex items-center justify-center">
                        ${item.image ? `<img src="${item.image}" class="w-full h-full object-cover">` : `<span class="text-zinc-600 text-xs font-black uppercase tracking-widest">Немає фото</span>`}
                        <div class="absolute bottom-3 right-3 bg-black/60 backdrop-blur-md text-white px-3 py-1.5 rounded-xl text-sm font-black border border-zinc-800">
                            ${item.price} ₴
                        </div>
                    </div>
                    <div class="pt-4 px-1 flex flex-col flex-grow">
                        <h3 class="text-lg font-bold tracking-tight text-white mb-1">${item.name}</h3>
                        <p class="text-zinc-500 text-xs leading-relaxed mb-4 flex-grow line-clamp-2">${item.description || 'Опис відсутній.'}</p>
                        <button onclick="addToCart('${item.id}')" class="w-full bg-white text-black hover:bg-zinc-200 py-3.5 rounded-xl font-black text-sm transition active:scale-95">
                            Додати
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const match = fullMenu.find(m => m.id === id);
            if (!match) return;
            cart.push({ ...match, item_uid: Date.now() });
            localStorage.setItem(`cart_table_${tableId}`, JSON.stringify(cart));
            updateCartUI();
            syncClientState();
        }

        function removeFromCart(itemUid) {
            cart = cart.filter(i => i.item_uid !== itemUid);
            localStorage.setItem(`cart_table_${tableId}`, JSON.stringify(cart));
            updateCartUI();
            if (cart.length === 0) closeCartModal();
            syncClientState();
        }

        function updateCartUI() {
            const triggerBtn = document.getElementById("cart-trigger-btn");
            const totalBadge = document.getElementById("cart-total-badge");
            const finalPrice = document.getElementById("cart-final-price");
            
            const totalSum = cart.reduce((acc, curr) => acc + curr.price, 0);
            
            if (cart.length > 0) {
                triggerBtn.classList.remove('hidden');
                triggerBtn.classList.add('flex');
            } else {
                triggerBtn.classList.add('hidden');
                triggerBtn.classList.remove('flex');
            }
            
            totalBadge.innerText = `${totalSum} ₴`;
            finalPrice.innerText = `${totalSum} ₴`;
            
            document.getElementById("cart-items-list").innerHTML = cart.map(i => `
                <div class="bg-zinc-900 border border-zinc-800/60 p-4 rounded-xl flex justify-between items-center">
                    <div>
                        <p class="font-bold text-sm text-white">${i.name}</p>
                        <p class="text-zinc-500 text-xs font-bold mt-0.5">${i.price} ₴</p>
                    </div>
                    <button onclick="removeFromCart(${i.item_uid})" class="text-zinc-500 hover:text-white font-bold p-2 text-sm tracking-wide">
                        Видалити
                    </button>
                </div>
            `).join('');
        }

        function openCartModal() { document.getElementById("cart-modal").classList.remove('hidden'); }
        function closeCartModal() { document.getElementById("cart-modal").classList.add('hidden'); }

        function callWaiter() {
            socket.emit("call_waiter", { table: tableId });
            alert("Запит надіслано. Офіціант підійде найближчим часом.");
        }

        async function submitOrder() {
            if (cart.length === 0) return;
            const totalSum = cart.reduce((acc, curr) => acc + curr.price, 0);
            
            const res = await fetch('/api/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    table: tableId,
                    items: cart,
                    total: totalSum
                })
            });
            
            if (res.ok) {
                const data = await res.json();
                myCurrentOrderId = data.order.id;
                myCurrentOrderStatus = data.order.status;
                
                localStorage.setItem(`last_order_table_${tableId}`, myCurrentOrderId);
                localStorage.setItem(`last_order_status_${tableId}`, myCurrentOrderStatus);
                
                cart = [];
                localStorage.setItem(`cart_table_${tableId}`, JSON.stringify(cart));
                
                updateCartUI();
                closeCartModal();
                renderStatusWidget();
                syncClientState();
                alert(`Замовлення #${myCurrentOrderId} успішно надіслано та обробляється!`);
            }
        }

        function renderStatusWidget() {
            const widget = document.getElementById("active-order-status");
            const label = document.getElementById("order-id-label");
            const badge = document.getElementById("order-status-badge");
            
            if (myCurrentOrderId && myCurrentOrderStatus && myCurrentOrderStatus !== "Завершено") {
                widget.classList.remove("hidden");
                label.innerText = `ID: ${myCurrentOrderId}`;
                badge.innerText = myCurrentOrderStatus;
                
                if (myCurrentOrderStatus === "Нове") {
                    badge.className = "bg-blue-600 text-white text-xs font-black px-4 py-1.5 rounded-full uppercase tracking-wider";
                } else if (myCurrentOrderStatus === "Готується") {
                    badge.className = "bg-amber-500 text-black text-xs font-black px-4 py-1.5 rounded-full uppercase tracking-wider";
                } else if (myCurrentOrderStatus === "Готово") {
                    badge.className = "bg-green-600 text-white text-xs font-black px-4 py-1.5 rounded-full uppercase tracking-wider";
                }
            } else {
                widget.classList.add("hidden");
            }
        }

        socket.on("order_status_updated", (data) => {
            if (data.id === myCurrentOrderId) {
                myCurrentOrderStatus = data.status;
                localStorage.setItem(`last_order_status_${tableId}`, myCurrentOrderStatus);
                renderStatusWidget();
            }
        });

        socket.on("menu_updated", loadMenuData);

        window.onload = init;
    </script>
</body>
</html>
